name: Build Unsigned DMG

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build App & Pack DMG
        run: |
          mkdir -p dist
          echo "==> Building OpenUsage with SwiftPM..."
          swift build -c release --product OpenUsage
          swift build -c release --product openusage-cli
          
          BUILD_DIR="$(swift build -c release --show-bin-path)"
          
          APP_NAME="OpenUsage"
          APP_BUNDLE="dist/$APP_NAME.app"
          APP_CONTENTS="$APP_BUNDLE/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"
          APP_HELPERS="$APP_CONTENTS/Helpers"
          APP_RESOURCES="$APP_CONTENTS/Resources"
          
          mkdir -p "$APP_MACOS" "$APP_HELPERS" "$APP_RESOURCES"
          cp "$BUILD_DIR/OpenUsage" "$APP_MACOS/$APP_NAME"
          cp "$BUILD_DIR/openusage-cli" "$APP_HELPERS/openusage"
          chmod +x "$APP_MACOS/$APP_NAME" "$APP_HELPERS/openusage"
          
          for bundle in "$BUILD_DIR"/*.bundle; do
            [ -d "$bundle" ] && cp -R "$bundle" "$APP_RESOURCES/"
          done
          
          if [ -d "assets/AppIcon.prebuilt" ]; path_to_car="assets/AppIcon.prebuilt/Assets.car"; [ -f "$path_to_car" ]; then
            cp "$path_to_car" "$APP_RESOURCES/"
          fi

          cat > "$APP_CONTENTS/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>$APP_NAME</string>
            <key>CFBundleIdentifier</key>
            <string>com.robinebers.openusage</string>
            <key>CFBundleName</key>
            <string>$APP_NAME</string>
            <key>CFBundleDisplayName</key>
            <string>$APP_NAME</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>15.0</string>
            <key>CFBundleIconName</key>
            <string>AppIcon</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          PLIST

          echo "==> Ad-hoc signing bundle..."
          codesign --force --deep --sign - "$APP_BUNDLE"

          echo "==> Creating DMG..."
          DMG_FILE="dist/OpenUsage-zh-TW-${GITHUB_REF_NAME}.dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP_BUNDLE" -ov -format UDZO "$DMG_FILE"

      - name: Publish Release & DMG
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          title: "OpenUsage 繁體中文版 ${{ github.ref_name }}"
          body: "OpenUsage 繁體中文（台灣）介面版本產出的 DMG 安裝檔。"
