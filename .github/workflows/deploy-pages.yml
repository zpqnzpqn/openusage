# Deploys the gh-pages branch content (appcast.xml, pricing_supplement.json) to the live Pages site.
#
# The repo's Pages source is "GitHub Actions", not "Deploy from a branch": GitHub's legacy
# branch-deploy pipeline repeatedly failed server-side ("Deployment failed, try again later",
# deployments stuck in deployment_queued) in July 2026, leaving the live appcast stale while the
# branch was current. This workflow replaces it.
#
# Trigger notes (why workflow_run and not `on: push branches: [gh-pages]`): the Release and
# Publish pricing supplement workflows push to gh-pages with the built-in GITHUB_TOKEN, and GitHub
# suppresses workflow triggers from GITHUB_TOKEN pushes. workflow_run on their completion is the
# reliable signal — and it requires this file to live on the default branch, which also makes
# manual dispatch work.
name: Deploy Pages

on:
  workflow_run:
    workflows: ["Release", "Publish pricing supplement"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Deploy after a successful publish; a failed Release never touched gh-pages, so skip.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: gh-pages

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
